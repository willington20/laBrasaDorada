version: '3.8'

services:

  # ── Servidor PHP + Apache ──
  web:
    build: .
    ports:
      - "8080:80"           # Accede en http://localhost:8080
    volumes:
      - .:/var/www/html     # Sincroniza tus archivos en tiempo real
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=root1234
      - DB_NAME=brasa_dorada

  # ── Base de datos MySQL ──
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: brasa_dorada
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql        # Guarda los datos aunque apagues Docker
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql  # Carga la BD automaticamente

  # ── phpMyAdmin (opcional, para ver la BD visualmente) ──
  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"           # Accede en http://localhost:8081
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root1234

volumes:
  db_data: